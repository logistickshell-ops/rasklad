<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Подсказка Интуиции — Светлый Расклад</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- React UMD -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- Babel standalone для JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e0f7fa 100%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .card-back-rainbow-fallback {
      background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #ffecd2, #a1c4fd, #c2e9fb, #d4fc79, #96e6a1);
      background-size: 400% 400%;
      animation: rainbowShiftFallback 10s ease infinite;
    }
    @keyframes rainbowShiftFallback {
      0% { background-position: 0% 50% }
      50% { background-position: 100% 50% }
      100% { background-position: 0% 50% }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    const GRID_OPTIONS = [
      { label: '4 × 3 (12 ячеек)', value: '4x3', w: 4, h: 3 },
      { label: '3 × 4 (12 ячеек)', value: '3x4', w: 3, h: 4 },
      { label: '2 × 2 (4 ячейки)', value: '2x2', w: 2, h: 2 },
      { label: '1 × 5 (5 ячеек)', value: '1x5', w: 5, h: 1 },
      { label: '5 × 1 (5 ячеек)', value: '5x1', w: 1, h: 5 },
      { label: '3 × 3 (9 ячеек)', value: '3x3', w: 3, h: 3 },
    ];

    const CARD_BACK_URL = 'https://raw.githubusercontent.com/logistickshell-ops/rasklad/main/assets/images/card_back.png';

    function shuffleArray(array) {
      const arr = [...array];
      const randomValues = new Uint32Array(arr.length);
      window.crypto.getRandomValues(randomValues);
      for (let i = arr.length - 1; i > 0; i--) {
        const j = randomValues[i] % (i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function CardBack({ src, cardId, small }) {
      return React.createElement('div', {
        className: 'w-full h-full card-back-rainbow-fallback rounded-lg border-2 border-yellow-200/50 shadow-inner overflow-hidden flex items-center justify-center relative'
      }, [
        React.createElement('img', {
          key: 'img',
          src,
          alt: 'Card Back',
          className: 'absolute inset-0 w-full h-full object-cover rounded-lg'
        }),
        React.createElement('div', {
          key: 'num',
          className: 'w-full h-full flex flex-col justify-end items-start pl-1 pb-1 absolute inset-0 pointer-events-none'
        }, React.createElement('div', {
          className: (small ? 'w-6 h-9' : 'w-8 h-12') + ' border border-white/30 rounded flex items-center justify-center'
        }, React.createElement('span', {
          className: 'text-yellow-300 ' + (small ? 'text-sm' : 'text-base') + ' font-bold'
        }, String(cardId + 1))))
      ]);
    }

    function CardFront({ card, small }) {
      let borderClass = 'border-gray-200 text-gray-400';
      if (card.type === 'win') borderClass = 'border-green-400 text-green-600 bg-green-50';
      if (card.type === 'burn') borderClass = 'border-red-400 text-red-600 bg-red-50';

      return React.createElement('div', {
        className: 'w-full h-full rounded-lg border-2 flex items-center justify-center bg-white shadow-sm overflow-hidden ' + borderClass
      }, React.createElement('span', {
        className: (small ? 'text-[9px]' : 'text-[10px]') + ' font-bold text-center leading-tight px-1 break-words'
      }, card.label));
    }

    function App() {
      const [winCount, setWinCount] = useState(2);
      const [burnCount, setBurnCount] = useState(1);
      const [gridValue, setGridValue] = useState('4x3');
      const [winText, setWinText] = useState('');
      const [burnText, setBurnText] = useState('');
      const [cards, setCards] = useState([]);
      const [isAllVisible, setIsAllVisible] = useState(false);
      const [cardBackSrc, setCardBackSrc] = useState(CARD_BACK_URL);
      const [previewImage, setPreviewImage] = useState(null);
      const [isShooting, setIsShooting] = useState(false);

      const gridConfig = useMemo(() => GRID_OPTIONS.find(o => o.value === gridValue), [gridValue]);
      const totalSpecial = winCount + burnCount;

      const generateLayout = useCallback(() => {
        const totalCells = gridConfig.w * gridConfig.h;
        if (totalSpecial > totalCells) {
          alert('Ошибка: Карт больше, чем ячеек!');
          return;
        }

        const newCards = new Array(totalCells).fill(null).map((_, i) => ({
          id: i,
          type: 'neutral',
          isOpen: false,
          label: '·'
        }));

        const indices = shuffleArray([...Array(totalCells).keys()]);
        const winIndices = indices.slice(0, winCount);
        const burnIndices = indices.slice(winCount, winCount + burnCount);

        const winLabels = winText.split(',').map(s => s.trim()).filter(Boolean);
        const burnLabels = burnText.split(',').map(s => s.trim()).filter(Boolean);

        winIndices.forEach((idx, i) => {
          newCards[idx].type = 'win';
          newCards[idx].label = winLabels[i] || '✦';
        });

        burnIndices.forEach((idx, i) => {
          newCards[idx].type = 'burn';
          newCards[idx].label = burnLabels[i] || '🔥';
        });

        setCards(newCards);
        setIsAllVisible(false);
      }, [gridConfig, winCount, burnCount, winText, burnText, totalSpecial]);

      // Первый расклад при загрузке
      useEffect(() => { generateLayout(); }, []);

      // Смена сетки
      useEffect(() => { generateLayout(); }, [gridValue]);

      // Авто-перегенерация при смене числа карт
      useEffect(() => { generateLayout(); }, [winCount, burnCount]);

      // Загружаем рубашку как base64 — нет CORS проблем
      useEffect(() => {
        fetch(CARD_BACK_URL)
          .then(r => r.blob())
          .then(blob => {
            const reader = new FileReader();
            reader.onloadend = () => {
              if (typeof reader.result === 'string') setCardBackSrc(reader.result);
            };
            reader.readAsDataURL(blob);
          })
          .catch(() => {});
      }, []);

      // Telegram WebApp init
      useEffect(() => {
        if (window.Telegram?.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
        }
      }, []);

      const handleCardClick = (id) => {
        setCards(prev => prev.map(c => c.id === id ? { ...c, isOpen: !c.isOpen } : c));
      };

      const downloadDataUrl = (dataUrl) => {
        const link = document.createElement('a');
        link.href = dataUrl;
        link.download = 'rasklad-' + Date.now() + '.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const takeScreenshot = async () => {
        const element = document.getElementById('screenshot-area');
        if (!element || isShooting) return;

        setIsShooting(true);
        // ждём два кадра чтобы React отрисовал
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

        try {
          const canvas = await html2canvas(element, {
            backgroundColor: '#ffffff',
            scale: 2,
            useCORS: true,
            allowTaint: true
          });
          const dataUrl = canvas.toDataURL('image/png');
          downloadDataUrl(dataUrl);
          setPreviewImage(dataUrl);
        } catch (err) {
          console.error('Ошибка скриншота:', err);
          alert('Не удалось создать снимок. Попробуйте ещё раз.');
        } finally {
          setIsShooting(false);
        }
      };

      return React.createElement('div', {
        className: 'max-w-md mx-auto p-4 flex flex-col items-center'
      }, [
        // Область для скриншота
        React.createElement('div', { key: 'screenshot', id: 'screenshot-area', className: 'w-full flex flex-col items-center pb-2' }, [
          // Header
          React.createElement('div', {
            key: 'header',
            className: 'bg-white/50 backdrop-blur rounded-full px-4 py-1 text-[10px] text-purple-500 uppercase tracking-widest font-bold mb-6 shadow-sm border border-white/50'
          }, '✦ Светлый Расклад ✦'),

          // Сетка карт
          React.createElement('div', {
            key: 'grid',
            className: 'w-full bg-white/40 backdrop-blur-md rounded-3xl p-6 shadow-xl border border-white/60 mb-2 relative overflow-hidden'
          }, [
            React.createElement('div', {
              key: 'inner-grid',
              className: 'grid gap-3 transition-all duration-300 mx-auto',
              style: {
                gridTemplateColumns: 'repeat(' + gridConfig.w + ', 52px)',
                justifyContent: 'center'
              }
            }, cards.map(card =>
              React.createElement('div', {
                key: card.id,
                className: 'w-[52px] h-[72px] cursor-pointer',
                onClick: () => handleCardClick(card.id)
              }, !(card.isOpen || isAllVisible)
                ? React.createElement(CardBack, { src: cardBackSrc, cardId: card.id })
                : React.createElement(CardFront, { card })
              )
            )),
            React.createElement('div', {
              key: 'hint',
              className: 'text-center mt-6 text-[10px] text-gray-400 italic'
            }, 'Нажмите на карту, чтобы открыть её')
          ]),

          // Дата под сеткой
          React.createElement('div', {
            key: 'date',
            className: 'text-center text-[9px] text-gray-300 tracking-widest uppercase'
          }, 'Светлый Расклад • ' + new Date().toLocaleDateString('ru-RU'))
        ]),

        // Легенда
        React.createElement('div', {
          key: 'legend',
          className: 'flex justify-between w-full gap-2 mb-6 mt-4 text-[9px] font-medium uppercase tracking-tighter'
        }, [
          React.createElement('div', { key: 'w', className: 'flex-1 bg-white/60 p-2 rounded-xl border border-white/50 flex flex-col items-center' }, [
            React.createElement('span', { key: 'l', className: 'text-blue-400 mb-1' }, '✦ —'),
            React.createElement('span', { key: 't', className: 'text-gray-500' }, 'выигрышная карта')
          ]),
          React.createElement('div', { key: 'b', className: 'flex-1 bg-white/60 p-2 rounded-xl border border-white/50 flex flex-col items-center' }, [
            React.createElement('span', { key: 'l', className: 'text-red-400 mb-1' }, '🔥 — карта'),
            React.createElement('span', { key: 't', className: 'text-gray-500' }, 'сжигания')
          ]),
          React.createElement('div', { key: 'n', className: 'flex-1 bg-white/60 p-2 rounded-xl border border-white/50 flex flex-col items-center' }, [
            React.createElement('span', { key: 'l', className: 'text-gray-300 mb-1' }, '· — нейтральная'),
            React.createElement('span', { key: 't', className: 'text-gray-500' }, 'карта')
          ])
        ]),

        // Панель управления
        React.createElement('div', {
          key: 'controls',
          className: 'w-full bg-white/70 backdrop-blur rounded-3xl p-6 shadow-lg border border-white flex flex-col gap-5'
        }, [
          // Параметры
          React.createElement('div', { key: 'params', className: 'flex justify-between items-start' }, [
            React.createElement('div', { key: 'text' }, [
              React.createElement('h2', { className: 'text-gray-700 font-bold text-sm' }, 'Параметры расклада'),
              React.createElement('p', { className: 'text-[9px] text-gray-400 leading-tight' }, 'Выигрышные и сжигающие — разные карты.')
            ]),
            React.createElement('div', { className: 'bg-white border border-purple-100 rounded-xl px-3 py-2 text-center shadow-sm min-w-[60px]' }, [
              React.createElement('div', { className: 'text-[7px] text-purple-300 uppercase font-black mb-1' }, 'ОТКРЫВАЕТСЯ'),
              React.createElement('div', { className: 'text-lg font-bold text-gray-700' }, String(totalSpecial))
            ])
          ]),

          // Счётчики
          React.createElement('div', { key: 'win' }, [
            React.createElement('label', { className: 'text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1 block' }, 'ВЫИГРЫШНЫЕ'),
            React.createElement('div', { className: 'flex items-center bg-white rounded-xl border border-gray-100 px-3 py-1 shadow-sm' }, [
              React.createElement('button', { onClick: () => setWinCount(Math.max(0, winCount - 1)), className: 'text-gray-300 p-2 hover:text-purple-500 text-lg leading-none' }, '－'),
              React.createElement('input', { readOnly: true, value: winCount, className: 'flex-1 text-center font-bold text-gray-700 bg-transparent outline-none' }),
              React.createElement('button', { onClick: () => setWinCount(winCount + 1), className: 'text-gray-300 p-2 hover:text-purple-500 text-lg leading-none' }, '＋'),
              React.createElement('span', { className: 'ml-2' }, '💎')
            ])
          ]),

          React.createElement('div', { key: 'burn' }, [
            React.createElement('label', { className: 'text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1 block' }, 'СЖИГАЮЩИЕ'),
            React.createElement('div', { className: 'flex items-center bg-white rounded-xl border border-gray-100 px-3 py-1 shadow-sm' }, [
              React.createElement('button', { onClick: () => setBurnCount(Math.max(0, burnCount - 1)), className: 'text-gray-300 p-2 hover:text-purple-500 text-lg leading-none' }, '－'),
              React.createElement('input', { readOnly: true, value: burnCount, className: 'flex-1 text-center font-bold text-gray-700 bg-transparent outline-none' }),
              React.createElement('button', { onClick: () => setBurnCount(burnCount + 1), className: 'text-gray-300 p-2 hover:text-purple-500 text-lg leading-none' }, '＋'),
              React.createElement('span', { className: 'ml-2' }, '🔥')
            ])
          ]),

          // Сетка
          React.createElement('div', { key: 'layout' }, [
            React.createElement('label', { className: 'text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1 block' }, 'РАСКЛАД'),
            React.createElement('select', {
              value: gridValue,
              onChange: e => setGridValue(e.target.value),
              className: 'w-full bg-white rounded-xl border border-gray-100 px-4 py-2 text-sm font-medium text-gray-600 shadow-sm outline-none'
            }, GRID_OPTIONS.map(o =>
              React.createElement('option', { key: o.value, value: o.value }, o.label)
            ))
          ]),

          // Текстовые поля
          React.createElement('div', { key: 'texts', className: 'grid grid-cols-2 gap-3' }, [
            React.createElement('div', { key: 'win-text' }, [
              React.createElement('label', { className: 'text-[9px] font-black text-green-500 uppercase mb-1 block' }, 'ТЕКСТ (ВЫИГРЫШ)'),
              React.createElement('input', {
                placeholder: 'напр. слива, яблоко',
                value: winText,
                onChange: e => setWinText(e.target.value),
                className: 'w-full bg-green-50/30 rounded-xl border border-green-100 px-3 py-2 text-[10px] outline-none'
              })
            ]),
            React.createElement('div', { key: 'burn-text' }, [
              React.createElement('label', { className: 'text-[9px] font-black text-red-500 uppercase mb-1 block' }, 'ТЕКСТ (СЖИГАНИЕ)'),
              React.createElement('input', {
                placeholder: 'напр. огонь',
                value: burnText,
                onChange: e => setBurnText(e.target.value),
                className: 'w-full bg-red-50/30 rounded-xl border border-red-100 px-3 py-2 text-[10px] outline-none'
              })
            ])
          ]),

          // Кнопки
          React.createElement('div', { key: 'buttons', className: 'grid grid-cols-2 gap-3 mt-2' }, [
            React.createElement('button', {
              onClick: generateLayout,
              className: 'bg-blue-50 text-blue-600 rounded-xl py-3 text-[10px] font-bold border border-blue-100 hover:bg-blue-100 transition-colors active:scale-95'
            }, '↺ Новый расклад'),
            React.createElement('button', {
              onClick: () => setIsAllVisible(true),
              className: 'bg-yellow-50 text-yellow-600 rounded-xl py-3 text-[10px] font-bold border border-yellow-100 hover:bg-yellow-100 transition-colors active:scale-95'
            }, '👁 Открыть всё'),
            React.createElement('button', {
              onClick: () => { setIsAllVisible(false); setCards(c => c.map(k => ({ ...k, isOpen: false }))); },
              className: 'bg-white text-gray-400 rounded-xl py-3 text-[10px] font-bold border border-gray-100 hover:bg-gray-50 transition-colors active:scale-95'
            }, '☀️ Скрыть'),
            React.createElement('button', {
              onClick: takeScreenshot,
              disabled: isShooting,
              className: 'bg-cyan-50 text-cyan-600 rounded-xl py-3 text-[10px] font-bold border border-cyan-100 hover:bg-cyan-100 transition-colors active:scale-95 disabled:opacity-50'
            }, isShooting ? '⏳ Снимок…' : '📷 Снимок')
          ]),

          // Статистика
          React.createElement('div', { key: 'stats', className: 'pt-4 mt-2 border-t border-gray-50 flex justify-between items-center' }, [
            React.createElement('div', { className: 'text-[10px] text-gray-400' }, [
              'Открыто ',
              React.createElement('span', { className: 'font-bold' }, String(cards.filter(c => c.isOpen).length)),
              ' из ' + cards.length
            ]),
            React.createElement('div', { className: 'bg-gray-50 rounded-lg px-2 py-1 text-[10px] text-gray-400 font-mono tracking-tighter' }, gridConfig.w + ' × ' + gridConfig.h)
          ]),

          // Нижний блок
          React.createElement('div', { key: 'bottom', className: 'flex gap-2' }, [
            React.createElement('div', { className: 'flex-1 bg-green-50 text-green-500 rounded-full py-1 text-center text-[10px] font-bold' }, '💎 ' + winCount),
            React.createElement('div', { className: 'flex-1 bg-red-50 text-red-500 rounded-full py-1 text-center text-[10px] font-bold' }, '🔥 ' + burnCount),
            React.createElement('div', { className: 'flex-1 bg-blue-50 text-blue-500 rounded-full py-1 text-center text-[10px] font-bold' }, 'Ф ' + totalSpecial)
          ])
        ]),

        // Превью модалка
        previewImage ? React.createElement('div', {
          key: 'preview',
          className: 'fixed inset-0 bg-black/80 z-[2000] flex flex-col items-center justify-center p-4',
          onClick: () => setPreviewImage(null)
        }, React.createElement('div', {
          className: 'bg-white rounded-3xl p-5 max-w-full flex flex-col items-center',
          onClick: e => e.stopPropagation()
        }, [
          React.createElement('h3', { key: 'title', className: 'text-gray-800 font-bold mb-3 text-sm' }, 'Снимок готов! 📸'),
          React.createElement('img', {
            key: 'img',
            src: previewImage,
            alt: 'Снимок расклада',
            className: 'rounded-2xl max-w-full max-h-[55vh] border border-gray-100 shadow-sm'
          }),
          React.createElement('p', { key: 'hint', className: 'text-[9px] text-gray-400 mt-2 text-center max-w-[240px]' },
            'Если файл не сохранился — нажмите кнопку ниже или зажмите картинку.'
          ),
          React.createElement('div', { key: 'btns', className: 'flex gap-3 mt-4 w-full' }, [
            React.createElement('a', {
              href: previewImage,
              download: 'rasklad-' + Date.now() + '.png',
              className: 'flex-1 bg-green-500 text-white rounded-xl py-3 font-bold text-xs text-center hover:bg-green-600 transition-colors active:scale-95'
            }, '💾 Сохранить'),
            React.createElement('button', {
              onClick: () => setPreviewImage(null),
              className: 'bg-gray-100 text-gray-500 rounded-xl px-6 py-3 font-bold text-xs hover:bg-gray-200 transition-colors'
            }, 'Готово')
          ])
        ])) : null
      ]);
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
